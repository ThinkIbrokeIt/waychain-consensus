name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Build binary
        run: |
          mkdir -p release
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o release/waychain .
          sha256sum release/waychain > release/checksums.txt
          echo "Built binary:"
          ls -la release/

      - name: Test
        run: go test -count=1 ./...

      - name: Upload artifact (for now)
        uses: actions/upload-artifact@v4
        with:
          name: waychain-binary-${{ github.ref_name }}
          path: release/
          retention-days: 30

      - name: Done
        run: |
          echo "✅ Build complete for ${{ github.ref_name }}"
          echo "Binary available as artifact (download from this run's Artifacts section)"
          echo "Note: GitHub Release creation requires admin token — download artifact and create release manually"
