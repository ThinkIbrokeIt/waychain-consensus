name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Build
        run: |
          mkdir -p /tmp/waychain-release
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w" \
            -o /tmp/waychain-release/waychain \
            .
          cd /tmp/waychain-release && sha256sum waychain > checksums.txt
          echo "=== Build output ==="
          ls -la /tmp/waychain-release/

      - name: Test
        run: go test -count=1 ./...

      - name: Create GitHub Release
        id: create_release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const checksums = fs.readFileSync('/tmp/waychain-release/checksums.txt', 'utf8');
            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace('refs/tags/', ''),
              name: `Release ${context.ref.replace('refs/tags/', '')}`,
              body: `## ${context.ref.replace('refs/tags/', '')}\n\nAutomated release with pre-built binaries.\n\n### Checksums\n\`\`\`\n${checksums}\n\`\`\``,
              draft: false,
              prerelease: false
            });
            console.log(`Created release ${release.data.id}`);
            core.setOutput('upload_url', release.data.upload_url);
            core.setOutput('release_id', release.data.id);

      - name: Upload Binary
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: /tmp/waychain-release/waychain
          asset_name: waychain-linux-amd64
          asset_content_type: application/octet-stream
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Checksums
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: /tmp/waychain-release/checksums.txt
          asset_name: checksums.txt
          asset_content_type: text/plain
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
