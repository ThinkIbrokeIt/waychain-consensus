name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Verify go.mod
        run: |
          go mod verify
          go mod tidy
          git diff --exit-code go.mod go.sum || (echo "go.mod/go.sum changed — commit them" && exit 1)

      - name: Build
        run: go build -v -o waychain ./...

      - name: Unit Tests
        run: go test -v -count=1 ./...

      - name: Security Scan
        run: |
          chmod +x security_scan.sh
          ./security_scan.sh http://127.0.0.1:9545 || true
          # Note: full scan requires daemon running; basic checks run always

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: waychain-binary
          path: waychain
          retention-days: 7
